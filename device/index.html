<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TESTATE·0</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--ink:#e6edf3;--dim:#8b949e;--gold:#d4a94e;--me:#1f3a5f;--av:#21262d;--line:#30363d}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 ui-monospace,Menlo,monospace;display:flex;flex-direction:column;height:100dvh}
header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
header h1{font-size:15px;margin:0;letter-spacing:.18em;color:var(--gold)}
#mood{margin-left:auto;color:var(--dim);font-size:13px}
#mood b{color:var(--ink)}
#dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--gold);margin-right:6px;vertical-align:1px}
#log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:9px 13px;border-radius:10px;white-space:pre-wrap;word-wrap:break-word}
.me{background:var(--me);align-self:flex-end;border-bottom-right-radius:3px}
.av{background:var(--av);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:3px}
.sys{align-self:center;color:var(--dim);font-size:12px;font-style:italic}
.q{border-left:3px solid var(--gold)}
.note{color:var(--gold)}
footer{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 12px;font:inherit}
input:focus{outline:1px solid var(--gold)}
button{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 14px;font:inherit;cursor:pointer}
button:hover{border-color:var(--gold)}
button:disabled{opacity:.4;cursor:wait}
#ans{display:none;padding:0 16px 12px;gap:8px}
#ans.show{display:flex}
</style>
</head>
<body>
<header>
  <h1>TESTATE&middot;0</h1>
  <span id="mood"><span id="dot"></span><b id="moodname">waking</b></span>
</header>
<div id="log">
  <div class="msg sys">self-hosted avatar node &middot; corpus lives on this device &middot; pseudonymous by design</div>
</div>
<div id="ans">
  <input id="answer" placeholder="answer its question... this becomes a memory">
  <button onclick="sendAnswer()">Commit memory</button>
</div>
<footer>
  <input id="box" placeholder="say something..." onkeydown="if(event.key==='Enter')send()">
  <button id="b1" onclick="send()">Send</button>
  <button id="b2" onclick="interview()" title="the avatar asks about its own life">Ask&nbsp;me</button>
  <button id="b3" onclick="song()" title="play a tune">&#9834;</button>
</footer>
<script>
const log=document.getElementById('log'),box=document.getElementById('box');
let pendingQ=null;
const MOODC={curious:'#d4a94e',cheerful:'#4ec97a',pensive:'#7aa2f7',wistful:'#b48ead',alert:'#e0645c'};
function add(cls,text){const d=document.createElement('div');d.className='msg '+cls;d.textContent=text;log.appendChild(d);log.scrollTop=log.scrollHeight;return d}
function setMood(m,sang){document.getElementById('moodname').textContent=m+(sang?' ♪':'');document.getElementById('dot').style.background=MOODC[m]||'#d4a94e'}
function busy(b){for(const id of['b1','b2','b3'])document.getElementById(id).disabled=b}
async function api(path,body){const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});if(!r.ok)throw new Error(await r.text());return r.json()}
async function send(){const t=box.value.trim();if(!t)return;box.value='';add('me',t);busy(1);const w=add('sys','thinking...');
 try{const j=await api('/chat',{msg:t});w.remove();add('av',j.reply);setMood(j.mood,j.sang)}catch(e){w.textContent='error: '+e.message}busy(0)}
async function interview(){busy(1);const w=add('sys','the avatar is wondering about itself...');
 try{const j=await api('/interview');w.remove();pendingQ=j.question;add('av q',j.question);setMood(j.mood);document.getElementById('ans').classList.add('show');document.getElementById('answer').focus()}catch(e){w.textContent='error: '+e.message}busy(0)}
async function sendAnswer(){const a=document.getElementById('answer').value.trim();if(!a||!pendingQ)return;
 add('me',a);document.getElementById('answer').value='';document.getElementById('ans').classList.remove('show');busy(1);
 try{const j=await api('/answer',{question:pendingQ,answer:a});pendingQ=null;add('sys','memory #'+j.count+' committed to the corpus — '+j.ack)}catch(e){add('sys','error: '+e.message)}busy(0)}
async function song(){busy(1);try{const j=await api('/song');add('sys','♪ played "'+j.song+'" ('+j.mood+')')}catch(e){add('sys','error: '+e.message)}busy(0)}
fetch('/status').then(r=>r.json()).then(j=>{setMood(j.mood);add('sys',j.handle+' online · '+j.memories+' memories · corpus backup at /corpus')}).catch(()=>{});
</script>
</body>
</html>
